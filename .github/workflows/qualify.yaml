name: 'Qualify'

on:
  push:
    branches-ignore:
      - 'release-*'

concurrency:
  group: 'qualify-${{ github.ref }}'
  cancel-in-progress: true

permissions: {}

jobs:
  qualify:
    name: qualify
    runs-on: semversie-runner
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
      - name: setup dependencies
        timeout-minutes: 5
        run: npm ci
      - name: run tests
        run: npm test

  semVersie:
    name: semVersie
    runs-on: semversie-runner
    permissions:
      contents: read
    outputs:
      release: ${{ steps.semVersie.outputs.release }}
      release-notes: ${{ steps.semVersie.outputs.release-notes }}
      prerelease: ${{ steps.semVersie.outputs.prerelease }}
      tag: ${{ steps.semVersie.outputs.tag }}
      version: ${{ steps.semVersie.outputs.version }}
      version-pep-440: ${{ steps.semVersie.outputs['version-pep-440'] }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        timeout-minutes: 5
        with:
          node-version: '24'
      - name: setup dependencies
        timeout-minutes: 5
        run: npm ci
      - name: build distribution
        run: npm run build
      - id: semVersie
        name: semVersie
        uses: ./
        with:
          release-notes-format: 'docs/resources/release-format.md'

  formatting:
    name: Check code formatting
    runs-on: semversie-runner
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
      - name: check formatting
        run: npx prettier --check .

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read # only needed for private or internal repos
      actions: read # only needed for private or internal repos
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
